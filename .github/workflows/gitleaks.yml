name: Secret scan (gitleaks)

# Runs on every push and PR, and weekly as a sweep.
# Catches secrets that GitHub's native scanner misses (custom formats,
# and private repos without GitHub Advanced Security).

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"  # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for organizations >25 users.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
