<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ef4444" />
  <title>Пріоритети</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ path, size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {path}
      </svg>
    );
    const TrashIcon = (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></>} />;
    const PlusIcon = (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
    const StarIcon = (props) => <Icon {...props} path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} />;
    const ChevronIcon = ({ open, ...props }) => <Icon {...props} path={<polyline points={open ? "18 15 12 9 6 15" : "6 9 12 15 18 9"} />} />;

    const CONS_MAP = { 'незворотні': 3, 'зворотні': 2, 'ніякі': 1 };
    const DEAD_MAP = { 'сьогодні': 3, 'цей тиждень': 2, 'пізніше': 1 };

    const scoreTask = (task) => CONS_MAP[task.consequences] * DEAD_MAP[task.deadline];

    const getPriority = (score) => {
      if (score >= 7) return { label: 'P0', color: 'bg-red-500' };
      if (score >= 4) return { label: 'P1', color: 'bg-orange-500' };
      if (score >= 2) return { label: 'P2', color: 'bg-yellow-500' };
      return { label: 'P3', color: 'bg-gray-400' };
    };

    const MATRIX = [
      { row: 'Незворотні', vals: [9, 6, 3] },
      { row: 'Зворотні', vals: [6, 4, 2] },
      { row: 'Ніякі', vals: [3, 2, 1] },
    ];

    function PriorityMatrix() {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const loaded = useRef(false);
      const [title, setTitle] = useState('');
      const [consequences, setConsequences] = useState('зворотні');
      const [deadline, setDeadline] = useState('цей тиждень');
      const [sphere, setSphere] = useState('робота');
      const [showFramework, setShowFramework] = useState(false);

      useEffect(() => {
        fetch('/api/tasks')
          .then(r => r.json())
          .then(data => { setTasks(data); loaded.current = true; setLoading(false); })
          .catch(() => { setError('Не вдалося завантажити'); setLoading(false); });
      }, []);

      useEffect(() => {
        if (loaded.current) {
          fetch('/api/tasks', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tasks) });
        }
      }, [tasks]);

      const addTask = () => {
        if (!title.trim()) return;
        setTasks([...tasks, { id: Date.now(), title: title.trim(), consequences, deadline, sphere }]);
        setTitle('');
      };

      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

      const sortedTasks = [...tasks].sort((a, b) => scoreTask(b) - scoreTask(a));
      const topTask = sortedTasks[0];

      if (loading) return (
        <div className="max-w-2xl mx-auto p-4 min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="text-gray-400 text-sm">Завантаження...</div>
        </div>
      );

      if (error) return (
        <div className="max-w-2xl mx-auto p-4 min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="text-red-500 text-sm">{error}</div>
        </div>
      );

      return (
        <div className="max-w-2xl mx-auto p-4 min-h-screen bg-gray-50">
          <h1 className="text-2xl font-bold mb-1">Пріоритети</h1>
          <p className="text-sm text-gray-600 mb-1">Додай задачі — вони розсортуються за критеріями</p>

          <button onClick={() => setShowFramework(!showFramework)}
                  className="flex items-center gap-1 text-xs text-blue-600 mb-4 hover:underline">
            <ChevronIcon open={showFramework} size={14} /> Як працює пріоритизація
          </button>

          {showFramework && (
            <div className="bg-white rounded-lg p-4 shadow mb-4">
              <div className="text-sm font-semibold mb-3">наслідки x терміновість = бал</div>
              <div className="grid grid-cols-4 gap-1.5 text-xs text-center">
                <div></div>
                <div className="font-semibold py-1">Сьогодні</div>
                <div className="font-semibold py-1">Цей тижд.</div>
                <div className="font-semibold py-1">Пізніше</div>
                {MATRIX.map(r => (
                  <React.Fragment key={r.row}>
                    <div className="font-semibold text-left py-1.5">{r.row}</div>
                    {r.vals.map((score, i) => {
                      const p = getPriority(score);
                      return (
                        <div key={`${r.row}-${i}`} className={`${p.color} text-white rounded py-1.5 font-medium`}>
                          {score} {p.label}
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </div>
              <div className="mt-3 text-xs text-gray-500 space-y-0.5">
                <div>P0 — критично, робити зараз</div>
                <div>P1 — важливо, запланувати</div>
                <div>P2 — можна відкласти</div>
                <div>P3 — за бажанням</div>
              </div>
            </div>
          )}

          {topTask && (
            <div className="bg-gradient-to-r from-red-500 to-orange-500 text-white p-4 rounded-lg mb-4 shadow">
              <div className="flex items-center gap-2 text-xs uppercase tracking-wide opacity-90 mb-1">
                <StarIcon size={14} /> Головне на сьогодні
              </div>
              <div className="text-lg font-semibold">{topTask.title}</div>
              <div className="text-xs opacity-90 mt-1">
                {topTask.sphere} · наслідки: {topTask.consequences} · {topTask.deadline}
              </div>
            </div>
          )}

          <div className="bg-white rounded-lg p-4 shadow mb-4 space-y-3">
            <input type="text" value={title} onChange={(e) => setTitle(e.target.value)}
                   onKeyDown={(e) => e.key === 'Enter' && addTask()}
                   placeholder="Нова задача..."
                   className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <div>
              <label className="text-xs text-gray-600 block mb-1">Наслідки, якщо не зробити</label>
              <select value={consequences} onChange={(e) => setConsequences(e.target.value)}
                      className="w-full p-2 border border-gray-300 rounded-lg bg-white">
                <option value="незворотні">Незворотні (не можна відкотити)</option>
                <option value="зворотні">Зворотні (можна виправити)</option>
                <option value="ніякі">Ніякі (просто хочеться зробити)</option>
              </select>
            </div>

            <div>
              <label className="text-xs text-gray-600 block mb-1">Коли горить</label>
              <select value={deadline} onChange={(e) => setDeadline(e.target.value)}
                      className="w-full p-2 border border-gray-300 rounded-lg bg-white">
                <option value="сьогодні">Сьогодні</option>
                <option value="цей тиждень">Цей тиждень</option>
                <option value="пізніше">Пізніше</option>
              </select>
            </div>

            <div>
              <label className="text-xs text-gray-600 block mb-1">Сфера</label>
              <select value={sphere} onChange={(e) => setSphere(e.target.value)}
                      className="w-full p-2 border border-gray-300 rounded-lg bg-white">
                <option value="робота">Робота</option>
                <option value="особисте">Особисте</option>
              </select>
            </div>

            <button onClick={addTask}
                    className="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 flex items-center justify-center gap-2">
              <PlusIcon size={18} /> Додати
            </button>
          </div>

          {sortedTasks.length > 0 ? (
            <div className="space-y-2">
              <h2 className="text-sm font-semibold text-gray-700 px-1">Всі задачі ({sortedTasks.length})</h2>
              {sortedTasks.map((task) => {
                const priority = getPriority(scoreTask(task));
                return (
                  <div key={task.id} className="bg-white rounded-lg p-3 shadow flex items-start gap-3">
                    <div className={`${priority.color} text-white text-xs font-bold px-2 py-1 rounded shrink-0`}>
                      {priority.label}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium">{task.title}</div>
                      <div className="text-xs text-gray-500 mt-1">{task.sphere} · {task.consequences} · {task.deadline}</div>
                    </div>
                    <button onClick={() => deleteTask(task.id)} className="text-gray-400 hover:text-red-500 p-1 shrink-0" aria-label="Видалити">
                      <TrashIcon size={16} />
                    </button>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="text-center text-gray-500 text-sm mt-8">Поки порожньо. Додай першу задачу вище.</div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PriorityMatrix />);
  </script>
</body>
</html>
